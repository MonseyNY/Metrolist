name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Universal FOSS Release APK
        run: ./gradlew --console=plain assembleUniversalFossRelease --warning-mode summary -x lint -x lintUniversalFossRelease
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST: "false"

      - name: Generate keystore and sign APK
        run: |
          # Generate a keystore
          keytool -genkey -v \
            -keystore release.keystore \
            -storepass metrolist \
            -alias metrolist \
            -keypass metrolist \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist,O=Metrolist,C=US"

          # Find the unsigned APK
          UNSIGNED=$(find app/build/outputs/apk/universalFoss/release/ -name "*.apk" | head -1)
          echo "Found unsigned APK: $UNSIGNED"
          ls -la "$UNSIGNED"

          # Find build-tools
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"

          # Zipalign
          ${BUILD_TOOLS_DIR}zipalign -v -p 4 "$UNSIGNED" aligned.apk

          # Sign with apksigner
          ${BUILD_TOOLS_DIR}apksigner sign \
            --ks release.keystore \
            --ks-pass pass:metrolist \
            --ks-key-alias metrolist \
            --key-pass pass:metrolist \
            --out Metrolist-v13.2.1-lt-fix.apk \
            aligned.apk

          # Verify
          ${BUILD_TOOLS_DIR}apksigner verify --verbose Metrolist-v13.2.1-lt-fix.apk
          ls -la Metrolist-v13.2.1-lt-fix.apk

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: Metrolist-v13.2.1-lt-fix
          path: Metrolist-v13.2.1-lt-fix.apk
