name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -storepass metrolist \
            -alias metrolist \
            -keypass metrolist \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist,O=Metrolist,C=US"

      - name: Build Universal FOSS Release APK
        run: ./gradlew --console=plain assembleUniversalFossRelease --warning-mode summary -x lint -x lintUniversalFossRelease
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST: "false"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          UNSIGNED=$(find app/build/outputs/apk/universalFoss/release/ -name "*.apk" | head -1)
          $BUILD_TOOLS/zipalign -v 4 "$UNSIGNED" app-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:metrolist \
            --ks-key-alias metrolist \
            --key-pass pass:metrolist \
            --out Metrolist-v13.2.1-lt-fix.apk \
            app-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: Metrolist-v13.2.1-lt-fix
          path: Metrolist-v13.2.1-lt-fix.apk
